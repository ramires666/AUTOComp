name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install Windows integration dependency
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[windows]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -q --basetemp .test-ci
      - name: Build wheel
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir .build-ci
